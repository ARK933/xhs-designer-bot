name: Daily Xiaohongshu Scraper

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium
      
      - name: Debug - Check secrets
        run: |
          echo "SENDER_EMAIL is set: ${{ secrets.SENDER_EMAIL != '' }}"
          echo "SENDER_PASS is set: ${{ secrets.SENDER_PASS != '' }}"
          echo "RECEIVER_EMAIL is set: ${{ secrets.RECEIVER_EMAIL != '' }}"
      
      - name: Run scraper
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASS: ${{ secrets.SENDER_PASS }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        run: |
          python scraper.py || echo "Scraper exited with error code $?"
      
      - name: Check if log exists
        if: always()
        run: |
          ls -la
          if [ -f "scraper.log" ]; then
            echo "Log file found"
            cat scraper.log
          else
            echo "Log file not found"
          fi
