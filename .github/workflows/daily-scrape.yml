name: Daily Xiaohongshu Scraper

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 2 * * *'  # 每天 UTC 2:00 (北京时间 10:00)
  workflow_dispatch:     # 手动触发

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium
      
      - name: Verify secrets
        run: |
          if [ -z "${{ secrets.SENDER_EMAIL }}" ]; then
            echo "❌ Error: SENDER_EMAIL secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.SENDER_PASS }}" ]; then
            echo "❌ Error: SENDER_PASS secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.RECEIVER_EMAIL }}" ]; then
            echo "❌ Error: RECEIVER_EMAIL secret is not set"
            exit 1
          fi
          echo "✅ All secrets are configured"
      
      - name: Run scraper
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASS: ${{ secrets.SENDER_PASS }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        run: |
          python scraper.py
        continue-on-error: true
      
      - name: Check execution status
        if: always()
        run: |
          echo "Workflow execution completed"
          ls -la
